      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 100.93.83.43
          username: root
          key: ${{ secrets.Test }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          debug: true

          script: |
            set -x

            echo "===== START ====="

            hostname
            whoami
            pwd

            echo "===== NODE ====="
            node -v

            echo "===== NPM ====="
            npm -v

            echo "===== PM2 ====="
            pm2 list

            echo "===== PROJECT ====="
            cd /srv/shopdemo

            pwd
            ls -la

            echo "===== GIT STATUS ====="
            git status

            echo "===== GIT REMOTE ====="
            git remote -v

            echo "===== GIT PULL ====="
            git pull origin master

            echo "===== NPM INSTALL ====="
            npm install --production

            echo "===== PM2 RESTART ====="
            pm2 restart shopdemo || pm2 start server.js --name shopdemo

            echo "===== PM2 SAVE ====="
            pm2 save

            echo "===== DONE ====="
