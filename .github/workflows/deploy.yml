name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.VPN_KETNOISSH }}

      - name: Check Tailscale
        run: |
          tailscale status
          ping -c 4 100.93.83.43

      - name: Test SSH Login
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 100.93.83.43
          username: root
          password: ${{ secrets.DEMOCIDI }}
          port: 22
          timeout: 30s
          command_timeout: 2m
          debug: true

          script: |
            echo "HELLO"
            hostname
            whoami
            pwd
