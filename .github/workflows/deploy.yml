name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.VPN_KETNOISSH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 100.93.83.43
          username: root
          password: ${{ secrets.DEMOCIDI }}
          port: 22
          script: |
            cd /srv/shopdemo
            git pull
            
            pm2 delete all
            pm2 start "python3 -m http.server 3000 --directory public" --name shopdemo
            pm2 save
