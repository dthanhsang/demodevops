name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.VPN_KETNOISSH }}

      - name: Check Tailscale
        run: |
          tailscale status
          ping -c 4 100.93.83.43

      - name: Setup SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Test SSH
        run: |
          sshpass -p "${{ secrets.PASS }}" \
          ssh \
          -p 22 \
          -o StrictHostKeyChecking=no \
          -o PreferredAuthentications=password \
          -o PubkeyAuthentication=no \
          root@100.93.83.43 \
          "hostname && whoami"
