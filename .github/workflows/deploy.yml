name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.VPN_KETNOISSH }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 100.93.83.43
          username: root
          password: ${{ secrets.DEMOCIDI }}
          port: 22

          debug: true
          script_stop: true
          request_pty: true

          script: |
            set -e

            export PATH=$PATH:/usr/bin:/usr/local/bin

            cd /srv/shopdemo

            echo "===== CURRENT DIR ====="
            pwd

            echo "===== GIT PULL ====="
            git reset --hard
            git pull origin master

            echo "===== NODE VERSION ====="
            node -v
            npm -v

            echo "===== INSTALL ====="
            npm install

            echo "===== PM2 RESTART ====="
            pm2 restart shopdemo || pm2 start server.js --name shopdemo

            echo "===== PM2 SAVE ====="
            pm2 save

            echo "===== PM2 STATUS ====="
            pm2 status

            echo "===== CURRENT COMMIT ====="
            git log --oneline -1
